name: release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3
      - run: make dist DIST_VERSION=${GITHUB_REF_NAME#v}
      - uses: actions/attest@v4
        with:
          subject-path: 'dist/**/*'
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
