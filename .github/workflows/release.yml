name: release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3
      - run: make dist DIST_VERSION=${GITHUB_REF_NAME#v}
      - uses: actions/attest@v4
        with:
          subject-path: 'dist/**/*'
      - name: Extract release notes from CHANGELOG.md
        run: |
          awk -v ver="${GITHUB_REF_NAME#v}" '
            /^## \[/ { if (found) exit; if ($0 ~ "\\[" ver "\\]") { found=1; next } }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file /tmp/release-notes.md
